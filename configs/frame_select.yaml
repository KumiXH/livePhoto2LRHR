task:  # 任务级配置：定义本次运行名称和可复现随机种子
  name: livephoto_frame_select  # 任务名，会写入 run_summary，方便区分这次跑的是哪套配置
  seed: 42  # 随机种子；建议为整数，改了之后会影响带随机性的流程复现结果

data:  # 输入输出数据配置
  input_dir: D:/SR数据集/花  # 输入数据根目录；必须是存在的目录，程序会按“同名图片 + 同名视频”自动配对
  output_dir: D:/SR数据集/花_pairs  # 本次运行的总输出目录；可写绝对路径，所有阶段产物都落在这里
  recursive: true  # 是否递归扫描 input_dir 下的子目录
  image_exts: [".jpg", ".jpeg", ".png", ".heic", ".heif"]  # 识别为图片的扩展名列表；可填任意带点扩展名
  video_exts: [".mp4", ".mov"]  # 识别为视频的扩展名列表；可填任意带点扩展名
  output_ext: ".png"  # 所有导出图像统一保存成什么格式；可填任意图片扩展名，当前最推荐 .png

pipeline:  # 本次要运行哪些阶段
  stages:
    - frame_select  # 阶段一：从 MP4 中抽取与静态图最相似的一帧；合法值只有 frame_select/align/color_match

frame_select:  # 阶段一：抽帧匹配配置
  algorithm: dinov2_similarity  # 抽帧算法；当前可选 opencv_similarity / dinov2_similarity / fake_selector
  device: auto  # 抽帧阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  sample_fps: 15  # 候选帧采样频率：每秒取多少帧参与匹配；建议 > 0，越大越准但越慢
  top_k: 5  # 记录前 K 个最优候选帧到 metadata；建议 >= 1，常用 1~10
  batch_size: 16  # 阶段一内部批量处理大小；建议 >= 1，常用 4~32
  resize_short_side: 518  # 做相似度计算前，把图像短边统一缩放到这个尺寸附近；建议 >= 32，常用 256~640
  score_fusion:  # dinov2_similarity 可选分数融合参数
    feature_weight: 0.7  # 特征相似度权重；建议 0.0~1.0，通常与 edge_weight 一起配合使用
    edge_weight: 0.3  # 边缘结构相似度权重；建议 0.0~1.0，通常与 feature_weight 之和接近 1.0

align:  # 阶段二配置：这里保留完整结构，方便你后续直接开启
  enabled: false  # 是否开启对齐阶段
  algorithm: identity_alignment  # 主对齐算法；当前可选 identity_alignment / phase_correlation_translation / ecc_alignment / coarse_to_flow / global_ecc_homography / feature_match_transform / feature_match_homography / hybrid_feature_flow / mask_aware_alignment
  device: auto  # 对齐阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  output_folder: LR_aligned  # 对齐后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名，不能写绝对路径
  confidence_threshold: 0.3  # 对齐置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  fallback_algorithm: identity_alignment  # 主算法失败时的兜底对齐算法；可选值通常与 align.algorithm 同一批算法名一致
  on_failure: keep_original  # 对齐失败后的处理策略；当前常用 keep_original / skip。keep_original=写入原始 LR 占位，skip=不写阶段二输出图
  artifacts:  # 调试产物开关
    save_debug_overlay: false  # 是否保存对齐前后叠加可视化图
    save_flow: false  # 是否保存光流图等调试产物
    save_masks: false  # 是否保存 mask-aware 相关调试掩码图
  phase_correlation:  # phase_correlation_translation 相关参数
    resize_short_side: 512  # 做相位相关前的缩放短边；建议 >= 32，常用 256~1024
  ecc:  # ecc_alignment / global_ecc_homography 相关参数
    motion_model: affine  # ECC 几何模型；当前常用 affine / homography
    number_of_iterations: 100  # ECC 最大迭代次数；建议 >= 1，常用 50~500
    termination_eps: 1.0e-5  # ECC 提前停止阈值；建议 > 0，常用 1e-6~1e-3
    gaussian_filter_size: 5  # ECC 高斯平滑核大小；建议 >= 1，常用奇数 3~9
  optical_flow:  # 光流细化子配置
    enabled: false  # 是否开启光流细化
    algorithm: dis  # 光流算法；当前实现可选 dis / farneback

color_match:  # 阶段三配置：这里保留完整结构，方便你后续直接开启
  enabled: false  # 是否开启调色阶段
  algorithm: mean_std_lab  # 调色算法；当前可选 identity_color_match / mean_std_lab / histogram_match_lab / retinex_color_match / masked_color_transfer / image_adaptive_3d_lut_color_match / low_frequency_joint_appearance_match / learned_retinex_color_match / mask_aware_harmonization_network / diffusion_harmonization
  device: auto  # 调色阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  input_folder: auto  # 调色输入来源；可填 auto 或 output_dir 下某个单层 LR 类目录名。auto 通常优先接阶段二输出
  output_folder: LR_color_matched  # 调色后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名，不能写绝对路径
  confidence_threshold: 0.0  # 调色置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  on_failure: keep_original  # 调色失败后的处理策略；当前常用 keep_original / skip。keep_original=保留输入图，skip=不写阶段三输出图
  mean_std:  # mean_std_lab 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    eps: 1.0e-6  # 防止除零的小常数；建议 > 0，常用 1e-8~1e-3

report:  # 质量报告配置：这里显式关闭
  enabled: false  # 是否生成质量报告
  output_folder: reports  # 报告输出目录名；必须是 output_dir 下的单层安全目录名
  max_preview_samples: 24  # 预览拼图里最多展示多少个样本；建议 >= 0，常用 4~32
  thumbnail_size: 160  # 预览图缩略图尺寸；建议 >= 32，常用 96~320

export:  # 导出配置：这里保留完整结构，方便你后续直接开启
  enabled: false  # 是否根据报告和门槛，导出最终可训练的 LR/HR
  input_report: reports/quality_report.csv  # 导出阶段读取哪份质量报告作为筛选依据；必须是相对 output_dir 的路径，且文件名必须叫 quality_report.csv
  output_folder: final  # 最终训练集输出目录名；必须是 output_dir 下的单层安全目录名
  final_lr_source: raw  # 最终写进训练集 LR/ 的来源；合法值只有 raw / aligned / color_matched
  gate_lr_source: aligned  # 做质量门槛判断时，使用哪一路 LR 与 HR 比较；合法值只有 raw / aligned / color_matched
  final_lr_resize_mode: copy  # 最终 LR 导出倍率/模式；合法值只有 copy / raw / match_raw / 1.0 / 0.75 / 0.5
  min_align_confidence: 0.0  # 导出门槛：最小对齐置信度；建议 >= 0，常用 0.0~1.0
  require_align_status: success  # 只允许哪些 align 状态进入最终训练集；当前常用 success，也可留空/None 表示不限制
  require_flow_status:  # 只允许哪些光流状态进入最终训练集；常用 accepted，也可留空/None 表示不限制
  max_source_to_hr_mae:  # 质量门槛：LR 到 HR 的 MAE 上限；建议 >= 0，越小越严格

output:  # 输出行为配置
  save_metadata: true  # 是否保存每个样本的 metadata YAML
  overwrite: false  # 如果目标文件已存在，是否允许覆盖重写
