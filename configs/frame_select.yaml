task:
  name: livephoto_frame_select
  seed: 42

data:
  input_dir: D:/SR数据集/花
  output_dir: D:/SR数据集/花_pairs
  recursive: true
  image_exts: [".jpg", ".jpeg", ".png", ".heic"]
  video_exts: [".mp4", ".mov"]
  output_ext: ".png"

pipeline:
  stages:
    - frame_select

frame_select:
  algorithm: dinov2_similarity
  device: auto
  sample_fps: 15
  top_k: 5
  batch_size: 16
  resize_short_side: 518
  score_fusion:
    feature_weight: 0.7
    edge_weight: 0.3

align:
  enabled: false
  algorithm: identity_alignment
  device: auto
  output_folder: LR_aligned
  confidence_threshold: 0.3
  fallback_algorithm: identity_alignment
  on_failure: keep_original
  artifacts:
    save_debug_overlay: false
    save_flow: false
    save_masks: false
  phase_correlation:
    resize_short_side: 512
  ecc:
    motion_model: affine
    number_of_iterations: 100
    termination_eps: 1.0e-5
    gaussian_filter_size: 5
  optical_flow:
    enabled: false
    algorithm: dis

color_match:
  enabled: false
  algorithm: mean_std_lab
  device: auto
  input_folder: auto
  output_folder: LR_color_matched
  confidence_threshold: 0.0
  on_failure: keep_original
  mean_std:
    color_space: lab
    eps: 1.0e-6

output:
  save_metadata: true
  overwrite: false
