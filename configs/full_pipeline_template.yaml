task:  # 任务级配置：定义本次运行名称和可复现随机种子
  name: livephoto_full_pipeline  # 任务名，会写入 run_summary，方便区分这次跑的是哪套配置
  seed: 42  # 随机种子；建议为整数，改了之后会影响带随机性的流程复现结果

data:  # 输入输出数据配置
  # Use absolute paths on Windows or Linux.
  # Windows example: D:/datasets/livephoto/input
  # Linux example: /data/livephoto/input
  input_dir: /path/to/input  # 输入数据根目录；必须改成真实存在的目录，程序会按“同名图片 + 同名视频”自动配对
  output_dir: /path/to/output  # 本次运行的总输出目录；建议改成真实可写目录，所有阶段产物都落在这里
  recursive: true  # 是否递归扫描 input_dir 下的子目录
  image_exts: [".jpg", ".jpeg", ".png", ".heic", ".heif"]  # 识别为图片的扩展名列表；可填任意带点扩展名，当前常用默认是 .jpg/.jpeg/.png/.heic/.heif
  video_exts: [".mp4", ".mov"]  # 识别为视频的扩展名列表；可填任意带点扩展名，当前常用默认是 .mp4/.mov
  output_ext: ".png"  # 所有导出图像统一保存成什么格式；可填任意图片扩展名，当前最推荐 .png

pipeline:  # 本次要运行哪些阶段
  stages:
    - frame_select  # 阶段一：从 MP4 中抽取与静态图最相似的一帧；合法值只有 frame_select/align/color_match
    - align  # 阶段二：让 LR 在几何位置上尽量对齐到 HR；合法值只有 frame_select/align/color_match
    # - color_match  # 阶段三：让 LR 的亮度和颜色尽量贴近 HR；需要时再取消注释

runtime:  # 运行时行为
  # When true, stages such as align / color_match will retry samples whose last recorded
  # metadata status is failed, even if an old output file already exists.
  retry_failed_samples: false  # 是否优先重试上次失败样本，而不是因为旧文件存在就直接跳过
  parallel:  # 并行运行配置；当前真正并行支持最完整的是 frame_select
    # First production baseline:
    # frame_select supports worker planning and device assignment summary.
    # Recommended for multi-GPU servers: set num_workers to the number of GPUs you want to use.
    num_workers: 1  # worker 数量；建议 >= 1，多卡服务器常设为 GPU 数量
    gpu_ids: []  # GPU ID 列表；可填 [] 或 ["0","1"] 这种字符串列表，当前用于 worker 规划与分配
    # Example for an 8-GPU server:
    # num_workers: 8
    # gpu_ids: ["0", "1", "2", "3", "4", "5", "6", "7"]

frame_select:  # 阶段一：抽帧匹配配置
  # Use dinov2_similarity for best baseline quality, opencv_similarity for CPU-only smoke tests.
  algorithm: dinov2_similarity  # 抽帧算法；当前可选 opencv_similarity / dinov2_similarity / fake_selector
  device: auto  # 抽帧阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  sample_fps: 15  # 候选帧采样频率：每秒取多少帧参与匹配；建议 > 0，越大越准但越慢
  top_k: 5  # 记录前 K 个最优候选帧到 metadata；建议 >= 1，常用 1~10
  batch_size: 16  # 阶段一内部批量处理大小；建议 >= 1，常用 4~32
  resize_short_side: 518  # 做相似度计算前，把图像短边统一缩放到这个尺寸附近；建议 >= 32，常用 256~640
  score_fusion:  # dinov2_similarity 可选分数融合参数
    feature_weight: 0.7  # 特征相似度权重；建议 0.0~1.0，通常与 edge_weight 一起配合使用
    edge_weight: 0.3  # 边缘结构相似度权重；建议 0.0~1.0，通常与 feature_weight 之和接近 1.0

align:  # 阶段二：几何对齐配置
  enabled: true  # 是否开启对齐阶段
  algorithm: coarse_to_flow  # 主对齐算法；当前可选 identity_alignment / phase_correlation_translation / ecc_alignment / coarse_to_flow / global_ecc_homography / feature_match_transform / feature_match_homography / hybrid_feature_flow / mask_aware_alignment
  device: cpu  # 对齐阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  output_folder: LR_aligned_flow  # 对齐后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名，不能写绝对路径
  confidence_threshold: 0.3  # 对齐置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  fallback_algorithm: identity_alignment  # 主算法失败时的兜底对齐算法；可选值通常与 align.algorithm 同一批算法名一致
  on_failure: keep_original  # 对齐失败后的处理策略；当前常用 keep_original / skip。keep_original=写入原始 LR 占位，skip=不写阶段二输出图
  coarse_algorithm: phase_correlation_translation  # coarse_to_flow / hybrid_feature_flow / mask_aware 等算法内部使用的粗对齐算法；常见可选 phase_correlation_translation / ecc_alignment / feature_match_transform / identity_alignment
  artifacts:  # 调试产物开关
    save_debug_overlay: false  # 是否保存对齐前后叠加可视化图
    save_flow: false  # 是否保存光流图等调试产物
    save_masks: false  # 是否保存 mask-aware 相关调试掩码图
  phase_correlation:  # phase_correlation_translation 相关参数
    resize_short_side: 512  # 做相位相关前的缩放短边；建议 >= 32，常用 256~1024
  ecc:  # ecc_alignment / global_ecc_homography 相关参数
    motion_model: affine  # ECC 几何模型；当前常用 affine / homography
    number_of_iterations: 100  # ECC 最大迭代次数；建议 >= 1，常用 50~500
    termination_eps: 1.0e-5  # ECC 提前停止阈值；建议 > 0，常用 1e-6~1e-3
    gaussian_filter_size: 5  # ECC 高斯平滑核大小；建议 >= 1，常用奇数 3~9
  optical_flow:  # 光流细化子配置
    enabled: true  # 是否开启光流细化
    algorithm: dis  # 光流算法；当前实现可选 dis / farneback
  feature_match:  # 特征匹配子配置
    detector: orb  # 特征点提取器；当前最稳定的是 orb，其他值是否可用取决于 OpenCV 和具体实现
    transform_model: homography  # 几何模型；当前常用 affine / homography
    max_keypoints: 4000  # 最多提取多少个特征点；建议 >= 4，常用 500~8000
    ratio_test: 0.6  # Lowe ratio test 阈值；代码要求范围是 (0, 1]，越小越严格
    min_matches: 10  # 至少需要多少个有效匹配点；代码要求 >= 4，常用 4~50
    ransac_reproj_threshold: 3.0  # RANSAC 重投影误差阈值；代码要求 > 0，常用 1.0~10.0
  mask_aware:  # mask_aware_alignment 专属参数
    motion_model: translation  # 局部前景几何模型；当前常用 translation
    difference_threshold: 18.0  # 生成前景差异掩码的阈值；建议 >= 0，常用 5~50
    min_mask_fraction: 0.02  # 最小有效掩码占比；建议 0.0~1.0，常用 0.005~0.2
    blend_blur_ksize: 9  # 掩码边缘混合模糊核大小；建议 >= 1，常用奇数 3~21
    morphology_kernel_size: 5  # 形态学操作核大小；建议 >= 1，常用 3~11
  # Optional advanced backend:
  # algorithm: global_ecc_homography
  # algorithm: feature_match_transform
  # algorithm: feature_match_homography
  # algorithm: hybrid_feature_flow
  # algorithm: mask_aware_alignment

color_match:  # 阶段三：亮度/颜色对齐配置
  enabled: false  # 是否开启调色阶段
  algorithm: mean_std_lab  # 调色算法；当前可选 identity_color_match / mean_std_lab / histogram_match_lab / retinex_color_match / masked_color_transfer / image_adaptive_3d_lut_color_match / low_frequency_joint_appearance_match / learned_retinex_color_match / mask_aware_harmonization_network / diffusion_harmonization
  device: auto  # 调色阶段运行设备；常用可填 cpu / auto / cuda，具体是否真走 GPU 取决于算法实现
  input_folder: auto  # 调色输入来源；可填 auto 或 output_dir 下某个单层 LR 类目录名。auto 通常优先接阶段二输出
  output_folder: LR_color_matched  # 调色后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名，不能写绝对路径
  confidence_threshold: 0.0  # 调色置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  on_failure: keep_original  # 调色失败后的处理策略；当前常用 keep_original / skip。keep_original=保留输入图，skip=不写阶段三输出图
  mean_std:  # mean_std_lab 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    eps: 1.0e-6  # 防止除零的小常数；建议 > 0，常用 1e-8~1e-3
  histogram_match:  # histogram_match_lab 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    bins: 256  # 直方图分箱数；建议 >= 2，常用 32~512
  retinex:  # retinex_color_match 专属参数
    sigma: 15.0  # Retinex 平滑尺度；建议 > 0，常用 5~80
    eps: 1.0e-3  # 防止数值不稳定的小常数；建议 > 0，常用 1e-6~1e-2
  masked_transfer:  # masked_color_transfer 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    difference_threshold: 12.0  # 生成前景差异掩码的阈值；建议 >= 0，常用 5~50
    min_mask_fraction: 0.01  # 最小有效掩码占比；建议 0.0~1.0，常用 0.005~0.2
    max_mask_fraction: 0.85  # 最大有效掩码占比；建议 0.0~1.0，常用 0.3~0.95
    morphology_kernel_size: 5  # 形态学操作核大小；建议 >= 1，常用 3~11
  adaptive_3d_lut:  # image_adaptive_3d_lut_color_match 专属参数
    color_space: rgb  # 颜色空间；当前实现只支持 rgb
    grid_size: 9  # 3D LUT 网格大小；代码要求 >= 2，常用 5~17，越大表达能力越强但更重
    smoothing_sigma: 1.0  # 对 LUT 做平滑的强度；建议 >= 0，常用 0.0~5.0
    identity_mix: 0.1  # 与恒等映射混合的比例；建议 0.0~1.0，越大越保守、越不容易调色过头
  low_frequency_joint:  # low_frequency_joint_appearance_match 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    sigma: 5.0  # 低频分离平滑尺度；建议 > 0，常用 1~20
    base_mix: 0.85  # 低频外观混合比例；建议 0.0~1.0
    detail_preservation: 1.0  # 高频细节保留强度；建议 >= 0，常用 0.0~2.0
    chroma_strength: 0.7  # 色度迁移强度；建议 0.0~1.0
  learned_retinex:  # learned_retinex_color_match 专属参数
    sigma: 15.0  # Retinex 平滑尺度；建议 > 0，常用 5~80
    eps: 1.0e-3  # 防止数值不稳定的小常数；建议 > 0，常用 1e-6~1e-2
    base_mix: 0.65  # 基底层外观混合比例；建议 0.0~1.0
  mask_aware_harmonization:  # mask_aware_harmonization_network 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    difference_threshold: 12.0  # 生成前景差异掩码的阈值；建议 >= 0，常用 5~50
    min_mask_fraction: 0.01  # 最小有效掩码占比；建议 0.0~1.0，常用 0.005~0.2
    max_mask_fraction: 0.85  # 最大有效掩码占比；建议 0.0~1.0，常用 0.3~0.95
    morphology_kernel_size: 5  # 形态学操作核大小；建议 >= 1，常用 3~11
    low_frequency_sigma: 5.0  # 低频平滑尺度；建议 > 0，常用 1~20
  diffusion_harmonization:  # diffusion_harmonization 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    num_steps: 4  # 迭代步数；建议 >= 1，常用 1~10，越大通常越慢
    guidance_strength: 0.6  # 向 HR 外观靠拢的强度；建议 0.0~1.0，越大改动越明显
    low_frequency_sigma: 4.0  # 低频外观平滑尺度；建议 > 0，常用 1.0~10.0
    lut_identity_mix: 0.15  # 内部保留原始外观的比例；建议 0.0~1.0，越大越保守
  # Optional advanced backend:
  # algorithm: histogram_match_lab
  # algorithm: retinex_color_match
  # algorithm: masked_color_transfer
  # algorithm: image_adaptive_3d_lut_color_match
  # algorithm: low_frequency_joint_appearance_match
  # algorithm: learned_retinex_color_match
  # algorithm: mask_aware_harmonization_network
  # algorithm: diffusion_harmonization

report:  # 质量报告生成配置
  enabled: true  # 是否生成质量报告
  output_folder: reports_flow  # 报告输出目录名；必须是 output_dir 下的单层安全目录名
  aligned_folder: LR_aligned_flow  # 报告中“aligned”那一路图像对应的目录名；必须是单层目录名
  color_matched_folder: LR_color_matched  # 报告中“color_matched”那一路图像对应的目录名；必须是单层目录名
  max_preview_samples: 24  # 预览拼图里最多展示多少个样本；建议 >= 0，常用 4~32
  thumbnail_size: 160  # 预览图缩略图尺寸；建议 >= 32，常用 96~320

export:  # 最终训练集导出配置
  enabled: true  # 是否根据报告和门槛，导出最终可训练的 LR/HR
  input_report: reports_flow/quality_report.csv  # 导出阶段读取哪份质量报告作为筛选依据；必须是相对 output_dir 的路径，且文件名必须叫 quality_report.csv
  output_folder: final_flow  # 最终训练集输出目录名；必须是 output_dir 下的单层安全目录名
  final_lr_source: raw  # 最终写进训练集 LR/ 的来源；合法值只有 raw / aligned / color_matched
  gate_lr_source: aligned  # 做质量门槛判断时，使用哪一路 LR 与 HR 比较；合法值只有 raw / aligned / color_matched
  final_lr_resize_mode: 0.5  # 最终 LR 导出倍率/模式；合法值只有 copy / raw / match_raw / 1.0 / 0.75 / 0.5
  # Supported resize modes:
  # copy      -> keep final_lr_source current size
  # raw       -> resize to raw LR size
  # match_raw -> alias of raw
  # 1.0       -> keep HR-space size through resample
  # 0.75      -> export at 75% of HR-space size
  # 0.5       -> export at 50% of HR-space size
  min_align_confidence: 0.3  # 导出门槛：最小对齐置信度；建议 >= 0，常用 0.0~1.0
  require_align_status: success  # 只允许哪些 align 状态进入最终训练集；当前常用 success，也可留空/None 表示不限制
  require_flow_status: accepted  # 只允许哪些光流状态进入最终训练集；常用 accepted，也可留空/None 表示不限制
  max_source_to_hr_mae: 30.0  # 质量门槛：LR 到 HR 的 MAE 上限；建议 >= 0，越小越严格
  # Optional stronger quality gates:
  # min_source_to_hr_psnr: 18.0
  # min_source_to_hr_ssim: 0.45
  # require_source_to_hr_dimension_match: true
  # require_source_to_hr_aspect_ratio_match: true
  # max_source_to_hr_border_mae: 12.0
  # max_mean_flow_magnitude: 20.0

output:  # 输出行为配置
  save_metadata: true  # 是否保存每个样本的 metadata YAML
  overwrite: false  # 如果目标文件已存在，是否允许覆盖重写
