task:  # 任务级配置：定义这次运行的名称和可复现随机种子
  name: heic_livephoto_diffusion_harmonization  # 任务名，会写入 run_summary，方便区分这次跑的是哪套黄金案例
  seed: 42  # 随机种子；建议为整数，改了之后会影响带随机性的流程复现结果

data:  # 输入输出数据配置
  input_dir: D:/SR数据集/HEIC_livephoto  # 输入数据根目录：按“同名图片 + 同名视频”自动配对；这里是 HEIC LivePhoto 真实测试集
  output_dir: D:/repository/livePhoto2LRHR/real_smoke/heic_livephoto_golden/output_diffusion_harmonization  # 本次运行的总输出目录；这里是 diffusion harmonization 黄金案例输出
  recursive: true  # 是否递归扫描 input_dir 下的子目录
  image_exts: [".jpg", ".jpeg", ".png", ".heic", ".heif"]  # 识别为图片的扩展名列表；HEIC/HEIF 测试时建议保留 .heic/.heif
  video_exts: [".mp4", ".mov"]  # 识别为视频的扩展名列表；当前常用默认是 .mp4/.mov
  output_ext: ".png"  # 所有导出图像统一保存成什么格式；可选任意图片扩展名，当前最推荐 .png

pipeline:  # 本次要运行哪些阶段
  stages:
    - frame_select  # 阶段一：从 MP4/MOV 中抽取与静态图最相似的一帧；合法值只有 frame_select/align/color_match
    - align  # 阶段二：让 LR 在几何位置上尽量对齐到 HR；合法值只有 frame_select/align/color_match
    - color_match  # 阶段三：让 LR 的亮度和颜色尽量贴近 HR；合法值只有 frame_select/align/color_match

runtime:  # 运行时行为
  retry_failed_samples: true  # 如果样本上一次失败了，这次允许优先重试，而不是因为旧文件存在就直接跳过

frame_select:  # 阶段一：抽帧匹配配置
  algorithm: opencv_similarity  # 抽帧算法；当前可选 opencv_similarity / dinov2_similarity / fake_selector
  device: cpu  # 抽帧阶段运行设备；常用可填 cpu / auto / cuda，这个黄金案例默认走 cpu
  sample_fps: 10  # 候选帧采样频率：每秒取多少帧参与匹配；建议 > 0，常用 5~30
  top_k: 5  # 记录前 K 个最优候选帧到 metadata；建议 >= 1，常用 1~10
  batch_size: 8  # 阶段一内部批量处理大小；建议 >= 1，常用 4~32
  resize_short_side: 518  # 做相似度计算前，把图像短边统一缩放到这个尺寸附近；建议 >= 32，常用 256~640

align:  # 阶段二：几何对齐配置
  enabled: true  # 是否开启对齐阶段
  algorithm: hybrid_feature_flow  # 主对齐算法；当前可选 identity_alignment / phase_correlation_translation / ecc_alignment / coarse_to_flow / global_ecc_homography / feature_match_transform / feature_match_homography / hybrid_feature_flow / mask_aware_alignment
  device: cpu  # 对齐阶段运行设备；常用可填 cpu / auto / cuda，这个黄金案例默认走 cpu
  output_folder: LR_aligned_diffusion_harmonization  # 对齐后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名
  confidence_threshold: 0.0  # 对齐置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  fallback_algorithm: phase_correlation_translation  # 主算法失败时的兜底对齐算法；可选值通常与 align.algorithm 同一批算法名一致
  on_failure: skip  # 对齐失败后的处理策略；当前常用 keep_original / skip。skip=直接丢弃该样本的阶段二输出，keep_original=写入原始 LR 占位
  coarse_algorithm: feature_match_transform  # hybrid_feature_flow 内部使用的粗对齐算法；常见可选 phase_correlation_translation / ecc_alignment / feature_match_transform / identity_alignment
  optical_flow:  # 光流细化子配置
    enabled: true  # 是否开启光流细化
    algorithm: dis  # 光流算法；当前实现可选 dis / farneback
  feature_match:  # 特征匹配子配置
    detector: orb  # 特征点提取器；当前最稳定的是 orb，其他值是否可用取决于 OpenCV 和具体实现
    transform_model: affine  # 几何模型；当前常用 affine / homography
    max_keypoints: 4000  # 最多提取多少个特征点；建议 >= 4，常用 500~8000
    ratio_test: 0.6  # Lowe ratio test 阈值；代码要求范围是 (0, 1]，越小越严格
    min_matches: 10  # 至少需要多少个有效匹配点；代码要求 >= 4，常用 4~50
    ransac_reproj_threshold: 3.0  # RANSAC 重投影误差阈值；代码要求 > 0，常用 1.0~10.0

color_match:  # 阶段三：亮度/颜色对齐配置
  enabled: true  # 是否开启调色阶段
  algorithm: diffusion_harmonization  # 调色算法；当前可选 identity_color_match / mean_std_lab / histogram_match_lab / retinex_color_match / masked_color_transfer / image_adaptive_3d_lut_color_match / low_frequency_joint_appearance_match / learned_retinex_color_match / mask_aware_harmonization_network / diffusion_harmonization
  device: cpu  # 调色阶段运行设备；常用可填 cpu / auto / cuda，这个黄金案例默认走 cpu
  input_folder: auto  # 调色输入来源；可填 auto 或 output_dir 下某个单层 LR 类目录名。auto 通常优先接阶段二输出
  output_folder: LR_color_diffusion_harmonization  # 调色后的 LR 输出目录名；必须是 output_dir 下的单层安全目录名
  confidence_threshold: 0.0  # 调色置信度阈值；建议 >= 0，常用 0.0~1.0，越大越严格
  on_failure: keep_original  # 调色失败后的处理策略；当前常用 keep_original / skip。keep_original=保留输入图，skip=不写阶段三输出图
  diffusion_harmonization:  # diffusion_harmonization 专属参数
    color_space: lab  # 颜色空间；当前默认和最常用的是 lab
    num_steps: 4  # 迭代步数；建议 >= 1，常用 1~10，越大通常越慢
    guidance_strength: 0.6  # 向 HR 外观靠拢的强度；建议 0.0~1.0，越大改动越明显
    low_frequency_sigma: 4.0  # 低频外观平滑尺度；建议 > 0，常用 1.0~10.0
    lut_identity_mix: 0.15  # 内部保留原始外观的比例；建议 0.0~1.0，越大越保守

report:  # 质量报告生成配置
  enabled: true  # 是否生成质量报告
  output_folder: reports_diffusion_harmonization  # 报告输出目录名；必须是 output_dir 下的单层安全目录名
  aligned_folder: LR_aligned_diffusion_harmonization  # 报告中“aligned”那一路图像对应的目录名；必须是单层目录名
  color_matched_folder: LR_color_diffusion_harmonization  # 报告中“color_matched”那一路图像对应的目录名；必须是单层目录名
  max_preview_samples: 4  # 预览拼图里最多展示多少个样本；建议 >= 0，常用 4~32
  thumbnail_size: 160  # 预览图缩略图尺寸；建议 >= 32，常用 96~320

export:  # 最终训练集导出配置
  enabled: true  # 是否根据报告和门槛，导出最终可训练的 LR/HR
  input_report: reports_diffusion_harmonization/quality_report.csv  # 导出阶段读取哪份质量报告作为筛选依据；必须是相对 output_dir 的路径
  output_folder: final_diffusion_harmonization_half  # 最终训练集输出目录名；必须是 output_dir 下的单层安全目录名
  final_lr_source: color_matched  # 最终写进训练集 LR/ 的来源；合法值只有 raw / aligned / color_matched
  gate_lr_source: color_matched  # 做质量门槛判断时，使用哪一路 LR 与 HR 比较；合法值只有 raw / aligned / color_matched
  final_lr_resize_mode: 0.5  # 最终 LR 导出倍率/模式；合法值只有 copy / raw / match_raw / 1.0 / 0.75 / 0.5。0.5=按 HR 空间尺寸缩到 1/2
  require_align_status: success  # 只允许哪些 align 状态进入最终训练集；当前常用 success，也可留空/None 表示不限制
  max_source_to_hr_mae: 40.0  # 质量门槛：LR 到 HR 的 MAE 上限；建议 >= 0，越小越严格
  min_source_to_hr_psnr: 18.0  # 质量门槛：LR 到 HR 的 PSNR 下限；建议 >= 0，越大越严格
  require_source_to_hr_aspect_ratio_match: true  # 质量门槛：LR 和 HR 的宽高比必须一致

output:  # 输出行为配置
  save_metadata: true  # 是否保存每个样本的 metadata YAML，里面会记录 top-k、对齐信息、调色信息、导出诊断等
  overwrite: true  # 如果目标文件已存在，是否允许覆盖重写
