task:
  name: livephoto_advanced_algorithms_demo
  seed: 42

data:
  input_dir: D:/repository/livePhoto2LRHR/real_smoke/livephoto_advanced_algorithms_demo/input
  output_dir: D:/repository/livePhoto2LRHR/real_smoke/livephoto_advanced_algorithms_demo/output
  recursive: true
  image_exts: [".jpg", ".jpeg", ".png", ".heic"]
  video_exts: [".mp4", ".mov"]
  output_ext: ".png"

pipeline:
  stages:
    - frame_select
    - align
    - color_match

runtime:
  retry_failed_samples: true
  parallel:
    num_workers: 1
    gpu_ids: []

frame_select:
  algorithm: dinov2_similarity
  device: auto
  sample_fps: 15
  top_k: 5
  batch_size: 8
  resize_short_side: 518
  score_fusion:
    feature_weight: 0.7
    edge_weight: 0.3

align:
  enabled: true
  algorithm: feature_match_homography
  device: cpu
  output_folder: LR_aligned_h
  confidence_threshold: 0.25
  fallback_algorithm: phase_correlation_translation
  on_failure: keep_original
  coarse_algorithm: phase_correlation_translation
  artifacts:
    save_debug_overlay: false
    save_flow: false
    save_masks: false
  phase_correlation:
    resize_short_side: 512
  ecc:
    motion_model: affine
    number_of_iterations: 100
    termination_eps: 1.0e-5
    gaussian_filter_size: 5
  optical_flow:
    enabled: false
    algorithm: dis
  feature_match:
    detector: orb
    max_keypoints: 4000
    ratio_test: 0.6
    min_matches: 10
    ransac_reproj_threshold: 3.0

color_match:
  enabled: true
  algorithm: histogram_match_lab
  device: cpu
  input_folder: LR_aligned_h
  output_folder: LR_color_hist
  confidence_threshold: 0.0
  on_failure: keep_original
  mean_std:
    color_space: lab
    eps: 1.0e-6
  histogram_match:
    color_space: lab
    bins: 256

report:
  enabled: true
  output_folder: reports_advanced
  aligned_folder: LR_aligned_h
  color_matched_folder: LR_color_hist
  max_preview_samples: 12
  thumbnail_size: 160

export:
  enabled: true
  input_report: reports_advanced/quality_report.csv
  output_folder: final_advanced_half
  final_lr_source: color_matched
  gate_lr_source: color_matched
  final_lr_resize_mode: 0.5
  min_align_confidence: 0.25
  require_align_status: success
  max_source_to_hr_mae: 40.0

output:
  save_metadata: true
  overwrite: true
