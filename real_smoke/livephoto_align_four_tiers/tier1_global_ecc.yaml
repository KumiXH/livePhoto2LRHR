task:
  name: livephoto_align_tier1_global_ecc
  seed: 42

data:
  input_dir: D:/repository/livePhoto2LRHR/real_smoke/livephoto_align_four_tiers/input
  output_dir: D:/repository/livePhoto2LRHR/real_smoke/livephoto_align_four_tiers/output_tier1_global_ecc
  recursive: true
  image_exts: [".jpg", ".jpeg", ".png", ".heic"]
  video_exts: [".mp4", ".mov"]
  output_ext: ".png"

pipeline:
  stages:
    - frame_select
    - align

frame_select:
  algorithm: dinov2_similarity
  device: auto
  sample_fps: 15
  top_k: 5
  batch_size: 8
  resize_short_side: 518
  score_fusion:
    feature_weight: 0.7
    edge_weight: 0.3

align:
  enabled: true
  algorithm: global_ecc_homography
  device: cpu
  output_folder: LR_aligned_tier1
  confidence_threshold: 0.25
  fallback_algorithm: phase_correlation_translation
  on_failure: keep_original
  ecc:
    motion_model: homography
    number_of_iterations: 200
    termination_eps: 1.0e-6
    gaussian_filter_size: 3

report:
  enabled: true
  output_folder: reports_tier1
  aligned_folder: LR_aligned_tier1
  color_matched_folder: LR_color_matched
  max_preview_samples: 12
  thumbnail_size: 160

output:
  save_metadata: true
  overwrite: true
